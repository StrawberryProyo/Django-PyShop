<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>
  </head>
  <body
    style="
      font-family:
        Segoe UI,
        Tahoma,
        Verdana,
        sans-serif;
      margin: 0;
      padding: 2rem;
      background: #f7f8fa;
      color: #333;
    "
  >
    <header
      style="
        max-width: 1100px;
        margin: 0 auto 1.5rem;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 0.9rem 1.1rem;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      "
    >
      <nav aria-label="Primary navigation">
        <ul
          style="
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 2.5rem;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
          "
        >
          <li>
            <a
              href="/"
              style="text-decoration: none; color: #111827; font-weight: 600"
              >Home</a
            >
          </li>
          <li>
            <a
              href="/products/"
              style="
                text-decoration: none;
                color: #0f172a;
                font-weight: 700;
                background: #e0f2fe;
                padding: 0.45rem 0.8rem;
                border-radius: 999px;
                border: 1px solid #7dd3fc;
              "
              >Products</a
            >
          </li>
          <li>
            <a href="#" style="text-decoration: none; color: #6b7280">Cart</a>
          </li>
          <li>
            <a href="#" style="text-decoration: none; color: #6b7280"
              >Transaction</a
            >
          </li>
          <li>
            <a href="#" style="text-decoration: none; color: #6b7280"
              >Settings</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main style="max-width: 1100px; margin: 0 auto">
      <h1 style="margin-top: 0">Products</h1>

      <div
        style="
          margin-bottom: 1.5rem;
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <select
          style="
            padding: 0.5rem 1rem;
            border: none;
            background: transparent;
            font-size: 0.95rem;
            cursor: pointer;
            color: #6b7280;
            outline: none;
          "
        >
          <option>Beverage</option>
        </select>
        <input
          type="text"
          placeholder="Search products..."
          style="
            padding: 0.5rem 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #6b7280;
            background: #fff;
            outline: none;
          "
        />
      </div>

      <div
        style="display: flex; justify-content: center; align-items: flex-start"
      >
        <aside style="width: auto; max-width: 100%">
          <nav aria-label="Product list">
            <ul
              style="
                list-style: none;
                padding: 0;
                margin: 0;
                display: grid;
                grid-template-columns: repeat(4, minmax(0, 1fr));
                gap: 0.75rem;
                max-height: 70vh;
                overflow: auto;
              "
            >
              {% for product in products %}
              <li
                style="
                  padding: 0.65rem;
                  border-radius: 10px;
                  border: 1px solid #e5e7eb;
                  background: #fff;
                  box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
                "
              >
                <div
                  style="
                    width: 100%;
                    height: 150px;
                    border-radius: 8px;
                    overflow: hidden;
                    background: #f3f4f6;
                    border: 1px solid #e5e7eb;
                    margin-bottom: 0.5rem;
                  "
                >
                  <img
                    src="{{ product.image_url }}"
                    alt="{{ product.prodname }}"
                    style="
                      width: 100%;
                      height: 100%;
                      object-fit: cover;
                      display: block;
                    "
                    loading="lazy"
                  />
                </div>
                <div style="min-width: 0">
                  <div style="font-weight: 600">{{ product.prodname }}</div>
                  <div style="font-size: 0.85rem; color: #6b7280">
                    ${{ product.price }}
                  </div>
                  <div
                    style="
                      font-size: 0.8rem;
                      color: #9ca3af;
                      margin-top: 0.25rem;
                    "
                  >
                    {{ product.description }}
                  </div>
                </div>
              </li>
              {% endfor %}
            </ul>
          </nav>
        </aside>
      </div>
    </main>
  </body>
</html>
