<div class="address-view">

    <div class="address-header">

        <button onclick="loadCheckoutView()">← Back</button>

        <h3>Select Address</h3>

    </div>

    <div class="address-list">

        <label class="address-card active">
            <input type="radio" name="address" checked>
            <div>
                <strong>Home</strong>
                <p>123 Main Street, Nueva Ecija</p>
            </div>
        </label>

        <label class="address-card">
            <input type="radio" name="address">
            <div>
                <strong>Work</strong>
                <p>Office Address, Nueva Ecija</p>
            </div>
        </label>

    </div>

    <button class="save-btn" onclick="loadCheckoutView()">
        Save Address
    </button>

</div>
