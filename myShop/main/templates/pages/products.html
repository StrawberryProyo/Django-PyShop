<script>

function toggleHeart(btn) {
    btn.classList.toggle("active");

    if (btn.classList.contains("active")) {
        btn.innerHTML = "♥";
    } else {
        btn.innerHTML = "♡";
    }
}

/* =========================
   OPEN MODAL
========================= */

function openModal(type) {

    // Save modal state (for refresh persistence)
    localStorage.setItem("activeModal", type);

    const modal = document.getElementById("modal");
    const backdrop = document.getElementById("modal-backdrop");
    const title = document.getElementById("modal-title");
    const body = document.getElementById("modal-body");

    // safety check (prevents null errors)
    if (!modal || !backdrop || !title || !body) return;

    modal.style.display = "block";
    backdrop.style.display = "block";

    const routes = {
        cart: {
            title: "My Cart",
            url: "/main/cart/"
        },
        wishlist: {
            title: "My Wishlist",
            url: "/main/wishlist/"
        },
        checkout: {
            title: "Checkout",
            url: "/main/checkout/"
        }
    };

    const selected = routes[type];

    if (!selected) {
        console.error("Unknown modal type:", type);
        return;
    }

    title.innerText = selected.title;

    htmx.ajax("GET", selected.url, {
        target: "#modal-body",
        swap: "innerHTML"
    });
}

/* =========================
   CLOSE MODAL
========================= */

function closeModal() {

    // REMOVE SAVED STATE
    localStorage.removeItem("activeModal");

    document.getElementById("modal").style.display = "none";
    document.getElementById("modal-backdrop").style.display = "none";
    document.getElementById("modal-body").innerHTML = "";
}

/* =========================
   RESTORE MODAL AFTER REFRESH
========================= */

window.addEventListener("load", () => {

    const savedModal = localStorage.getItem("activeModal");

    if (savedModal) {
        openModal(savedModal);
    }

});

</script>
